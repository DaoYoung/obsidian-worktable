name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run verify

      - name: Validate tag version
        id: validate
        shell: bash
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          if [[ "$GITHUB_REF_NAME" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create manual-install archive
        run: zip -j "obsidian-worktable-${{ steps.validate.outputs.version }}.zip" main.js manifest.json styles.css

      # Attest only the three files Obsidian recognizes. The manual-install
      # zip is a convenience bundle for non-BRAT users and is excluded so
      # the attestation subject list stays scoped to the artifacts Obsidian
      # actually reads from the release. Disabled with `if: false` —
      # actions/attest@v1 requires the repo's Artifact Attestations setting
      # to be enabled, which is not yet turned on for this repo. Re-enable
      # by removing the `if: false` line once that setting is on.
      - name: Attest build provenance
        if: false
        uses: actions/attest@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Obsidian only reads main.js / manifest.json / styles.css from a
          # release. The zip is a manual-install bundle (download + extract
          # into .obsidian/plugins/worktable/); BRAT reads manifest.json
          # directly from the repo, not from this asset.
          files: |
            main.js
            manifest.json
            styles.css
            obsidian-worktable-${{ steps.validate.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}